name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: 26.3.0

jobs:
  # The glyph engine is pure JS (BLAKE3, bit math, Unicode normalization) with no
  # Date/locale/filesystem in its output path, so determinism is guaranteed by
  # construction rather than by the OS. We run on Linux only; macOS adds ~10x the
  # cost for POSIX behaviour we already cover, and the CLI path logic is exercised
  # by the path-traversal tests. Re-add a windows-latest job here if you want CI
  # coverage of Windows path/EOL edge cases.
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r --filter "./packages/*" build
      - run: pnpm typecheck
      - run: pnpm test

  lint:
    name: lint & typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r --filter "./packages/*" build
      - run: pnpm check
      - run: pnpm --filter @eshlox/hashglyph-web check

  e2e:
    name: web build & e2e
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r --filter "./packages/*" build
      - run: pnpm --filter @eshlox/hashglyph-web exec playwright install --with-deps chromium
      - run: pnpm --filter @eshlox/hashglyph-web test:e2e

  # Prove the committed brand binaries are reproducible.
  brand:
    name: brand reproducibility
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r --filter "./packages/*" build
      - run: pnpm brand:verify

  audit:
    name: dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm audit --audit-level high
